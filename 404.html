<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Strona nie znaleziona | Hortensja</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f8f6f2;
            color: #1a1a1a;
            font-family: 'Playfair Display', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #c471ed;
            opacity: 0.8;
        }

        h2 {
            font-size: 32px;
            margin: 20px 0;
        }

        p {
            font-size: 18px;
            color: #555;
            max-width: 500px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: #1a1a1a;
            color: #fff;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 4px;
            transition: transform 0.2s, background 0.2s;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <h2>Ups! Zagubiony na Mazurach?</h2>
        <p>Strona, której szukasz, nie istnieje lub została przeniesiona. Zapraszamy z powrotem do bezpiecznej
            przystani.</p>
        <a href="/" class="btn">Powrót do strony głównej</a>
    </div>
</body>

</html>
